                <div class="w3-container w3-center">
                    <h1>Welcome to the Gallery</h1>

<div class="row">
  <div class="column">
    <img src="assets/CharcoalRecreation-72dpi.jpg" onclick="openModal();currentSlide(1)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="assets/CollagePortrait-72dpi.jpg" onclick="openModal();currentSlide(2)" class="hover-shadow">
  </div>
  <div class="column">
    <img src="assets/PhysicalCollage-72dpi.jpg" onclick="openModal();currentSlide(3)" class="hover-shadow">

    <img src="assets/TypographicQuote-72dpi.jpg" onclick="openModal();currentSlide(5)" class="hover-shadow">
  </div>
</div>

<!-- The Modal/Lightbox -->
<div id="myModal" class="modal">
  <span class="close cursor" onclick="closeModal()">&times;</span>
  <div class="modal-content">

    <div class="mySlides">
      <div class="numbertext">1 / 4</div>
      <img src="assets/CharcoalRecreation-72dpi.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">2 / 4</div>
      <img src="assets/CollagePortrait-72dpi.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">3 / 4</div>
      <img src="assets/PhysicalCollage-72dpi.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">4 / 4</div>
      <img src="assets/StevieNicksTourPoster-72dpi.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">5 / 5</div>
      <img src="assets/TypographicQuote-72dpi.jpg" style="width:100%">
    </div>

    <!-- Next/previous controls -->
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>

    <!-- Caption text -->
    <div class="caption-container">
      <p id="caption"></p>
    </div>

    <!-- Thumbnail image controls -->
    <div class="column">
      <img class="demo" src="assets/CharcoalRecreation-72dpi.jpg" onclick="currentSlide(1)" alt="Nature">
    </div>

    <div class="column">
      <img class="demo" src="assets/CollagePortrait-72dpi.jpg" onclick="currentSlide(2)" alt="Snow">
    </div>

    <div class="column">
      <img class="demo" src="assets/PhysicalCollage-72dpi.jpg" onclick="currentSlide(3)" alt="Mountains">
    </div>

    <div class="column">
      <img class="demo" src="assets/StevieNicksTourPoster-72dpi.jpg" onclick="currentSlide(4)" alt="Lights">
    </div>
   
    <div class="column">
      <img class="demo" src="assets/TypographicQuote-72dpi.jpg" onclick="currentSlide(5)" alt="Lights">
    </div>
</div>
